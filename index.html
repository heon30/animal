<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>BOMB NIGHT : 폭탄 서바이벌</title>
<style>
:root{
  --bg:#08090d; --panel:#11131a; --panel2:#181b24; --line:#2b2f3c;
  --text:#f5f0e8; --muted:#a7abb6; --red:#ff4d45; --red2:#9f1f25;
  --gold:#f2c14e; --blue:#72b7ff; --green:#71d79a; --purple:#c794ff;
  --shadow:0 18px 60px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{min-height:100%;margin:0;background:radial-gradient(circle at 50% -20%,#302027 0,#111019 38%,#07080c 75%);color:var(--text);font-family:Pretendard,"Noto Sans KR",system-ui,-apple-system,sans-serif}
body{min-height:100vh;overflow-x:hidden}
button,input{font:inherit}
button{border:0;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
button:disabled{cursor:not-allowed;opacity:.4}
#app{min-height:100vh}
.screen{width:min(1160px,100%);margin:0 auto;padding:24px 18px 48px}
.brand{display:flex;align-items:center;gap:13px;margin-bottom:24px}
.brandMark{width:52px;height:52px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(145deg,#ff6058,#7d151b);box-shadow:0 0 35px rgba(255,77,69,.28);font-size:29px}
.brand h1{margin:0;font-size:clamp(24px,4vw,38px);letter-spacing:-1.5px}
.brand p{margin:3px 0 0;color:var(--muted);font-size:13px;letter-spacing:.12em}
.hero{min-height:calc(100vh - 90px);display:grid;place-items:center}
.heroBox{width:min(780px,100%);padding:34px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(150deg,rgba(25,27,37,.96),rgba(11,12,17,.96));box-shadow:var(--shadow);position:relative;overflow:hidden}
.heroBox:before{content:"";position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,77,69,.12);filter:blur(35px);right:-120px;top:-150px}
.heroTitle{position:relative;text-align:center;margin-bottom:30px}
.heroTitle .bomb{font-size:70px;filter:drop-shadow(0 0 22px rgba(255,100,70,.35))}
.heroTitle h2{font-size:clamp(35px,8vw,72px);line-height:.95;margin:4px 0 10px;letter-spacing:-4px}
.heroTitle h2 span{color:var(--red)}
.heroTitle p{color:var(--muted);margin:0}
.formGrid{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:7px}
.field.full{grid-column:1/-1}
.field label{font-size:13px;color:var(--muted);font-weight:800}
.input{width:100%;height:54px;border-radius:15px;border:1px solid var(--line);background:#0a0b10;color:white;padding:0 16px;outline:none;font-size:17px;font-weight:800}
.input:focus{border-color:#87535b;box-shadow:0 0 0 4px rgba(255,77,69,.08)}
.btn{min-height:54px;border-radius:15px;background:#252936;padding:13px 18px;font-weight:900;transition:.18s transform,.18s background;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.btn:hover:not(:disabled){transform:translateY(-2px)}
.btn.primary{background:linear-gradient(135deg,#ff5d55,#ae2029);box-shadow:0 12px 28px rgba(177,31,40,.25)}
.btn.gold{background:linear-gradient(135deg,#f3cd61,#b77a17);color:#1a1205}
.btn.ghost{background:transparent;border:1px solid var(--line)}
.btn.danger{background:#4d171b;color:#ffbbb7}
.btn.small{min-height:40px;padding:8px 13px;border-radius:11px;font-size:13px}
.notice{padding:14px 16px;border:1px solid #3d3236;border-radius:15px;background:rgba(108,34,41,.16);color:#e5c6c7;font-size:13px;line-height:1.6}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.roomPill{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(16,18,25,.82);font-size:13px;color:var(--muted)}
.roomPill b{color:white;letter-spacing:.13em;font-size:16px}
.grid2{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(300px,.75fr);gap:18px}
.card{border:1px solid var(--line);border-radius:22px;background:linear-gradient(155deg,rgba(23,26,35,.97),rgba(13,14,20,.97));box-shadow:var(--shadow);overflow:hidden}
.cardPad{padding:22px}
.sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.sectionTitle h3{margin:0;font-size:18px}
.sectionTitle span{color:var(--muted);font-size:13px}
.codeBox{text-align:center;padding:30px 20px;background:radial-gradient(circle at 50% 0,rgba(255,77,69,.14),transparent 58%)}
.codeLabel{font-size:12px;letter-spacing:.2em;color:var(--muted);font-weight:900}
.code{font-size:clamp(48px,10vw,86px);font-weight:1000;letter-spacing:.13em;margin:8px 0;text-shadow:0 0 28px rgba(255,77,69,.25)}
.playerList{display:grid;gap:9px}
.playerRow{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#0d0f15;min-width:0}
.seat{width:34px;height:34px;border-radius:11px;background:#20232e;display:grid;place-items:center;color:var(--muted);font-weight:900;flex:0 0 auto}
.playerName{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.playerMeta{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);flex:0 0 auto}
.tag{padding:5px 8px;border-radius:999px;background:#242833;font-size:11px;font-weight:900;color:#cbd0db}
.tag.host{background:#5b4012;color:#ffd977}
.tag.dead{background:#321519;color:#ff9b98}
.tag.ready{background:#113623;color:#8ee3ae}
.gameHeader{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:18px}
.phaseBox{text-align:center}
.round{font-size:13px;color:var(--muted);font-weight:900;letter-spacing:.14em}
.phase{font-size:clamp(26px,5vw,44px);font-weight:1000;margin:2px 0}
.phase.day{color:var(--gold)} .phase.night{color:#b9c7ff} .phase.death{color:#ff6d67}
.timer{width:86px;height:86px;border-radius:50%;display:grid;place-items:center;border:6px solid #282c38;background:#090a0f;box-shadow:inset 0 0 22px rgba(0,0,0,.55),0 0 25px rgba(255,77,69,.12)}
.timer span{font-size:29px;font-weight:1000;font-variant-numeric:tabular-nums}
.overheat{margin:0 auto 16px;padding:13px 15px;border-radius:14px;border:1px solid #7a3924;background:linear-gradient(90deg,rgba(184,52,32,.22),rgba(112,29,35,.2));color:#ffc2a4;text-align:center;font-weight:900;animation:pulse 1.25s infinite alternate}
@keyframes pulse{from{box-shadow:0 0 0 rgba(255,80,50,0)}to{box-shadow:0 0 28px rgba(255,80,50,.14)}}
.roleCard{position:relative;min-height:230px;padding:24px;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(circle at 85% 15%,var(--roleGlow,rgba(255,77,69,.22)),transparent 45%),linear-gradient(150deg,#1b1d26,#0c0d12);border:1px solid var(--line);border-radius:22px;overflow:hidden}
.roleIcon{position:absolute;right:20px;top:18px;font-size:72px;opacity:.88;filter:drop-shadow(0 8px 20px rgba(0,0,0,.3))}
.roleKicker{font-size:12px;letter-spacing:.18em;color:var(--muted);font-weight:1000}
.roleName{font-size:34px;font-weight:1000;margin:7px 0 8px;letter-spacing:-1.5px}
.roleDesc{max-width:76%;color:#d3d5dc;line-height:1.55;font-size:14px}
.roleFoot{display:flex;gap:8px;flex-wrap:wrap;margin-top:17px}
.uses{padding:8px 10px;border:1px solid rgba(255,255,255,.1);border-radius:11px;background:rgba(0,0,0,.2);font-size:12px;font-weight:900}
.actionCard{margin-top:16px;padding:20px;border:1px solid var(--line);border-radius:22px;background:#11131a}
.actionTitle{font-size:18px;font-weight:1000;margin-bottom:6px}
.actionHint{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.actionGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.actionBtn{min-height:104px;border-radius:17px;background:#1e222d;border:1px solid #303544;padding:14px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-weight:1000;transition:.18s}
.actionBtn:hover:not(:disabled){transform:translateY(-3px);border-color:#565e72;background:#262b38}
.actionBtn .ico{font-size:32px}.actionBtn small{font-size:11px;color:var(--muted);font-weight:700}
.actionBtn.attack{background:linear-gradient(150deg,#3c181c,#201217);border-color:#5c252a}
.actionBtn.defend{background:linear-gradient(150deg,#172d3f,#111d27);border-color:#27475d}
.actionBtn.special{background:linear-gradient(150deg,#362849,#1d1727);border-color:#55406c}
.locked{padding:22px;text-align:center;border:1px dashed #3c4353;border-radius:17px;background:#0c0e13}
.locked .big{font-size:34px;margin-bottom:7px}.locked b{font-size:20px}.locked p{margin:7px 0 0;color:var(--muted);font-size:13px}
.scanResult{padding:15px;border-radius:15px;background:#121f25;border:1px solid #285061;margin-bottom:14px;color:#bfeaff;font-weight:900}
.log{display:grid;gap:9px}
.logItem{padding:12px 14px;border-left:3px solid #4a4f5f;background:#0c0e13;border-radius:0 12px 12px 0;font-size:14px;line-height:1.5}
.logItem.boom{border-left-color:var(--red);background:#1b0f12}.logItem.safe{border-left-color:var(--green)}.logItem.win{border-left-color:var(--gold);background:#1d190d}
.winnerBox{text-align:center;padding:32px 20px}
.trophy{font-size:70px}.winnerBox h2{font-size:36px;margin:8px 0}.winnerList{display:grid;gap:10px;max-width:560px;margin:22px auto}
.winner{padding:15px;border-radius:14px;background:#171a22;border:1px solid var(--line);font-weight:900}
.deadOverlay{padding:15px;border-radius:15px;background:#241216;border:1px solid #58242b;color:#ffaaa6;text-align:center;font-weight:900;margin-bottom:15px}
.modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.74);backdrop-filter:blur(7px);display:grid;place-items:center;padding:18px;z-index:50}
.modal{width:min(620px,100%);max-height:85vh;overflow:auto;background:#13151d;border:1px solid #343947;border-radius:24px;box-shadow:0 25px 90px rgba(0,0,0,.68);padding:22px}
.modal h3{margin:0 0 7px;font-size:24px}.modal p{margin:0 0 18px;color:var(--muted);font-size:13px;line-height:1.5}
.targetGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.targetBtn{padding:14px;border-radius:13px;background:#20242e;border:1px solid #343947;text-align:left;font-weight:900}
.targetBtn.selected{background:#572027;border-color:#ad3c44;color:#fff}
.modalActions{display:flex;gap:9px;margin-top:16px}.modalActions>*{flex:1}
.toastWrap{position:fixed;right:18px;bottom:18px;z-index:100;display:grid;gap:8px;width:min(390px,calc(100% - 36px))}
.toast{padding:14px 16px;border-radius:14px;background:#20232d;border:1px solid #3a3f4e;box-shadow:var(--shadow);font-weight:800;font-size:13px;animation:toastIn .2s ease}
.toast.error{background:#3a171b;border-color:#6c282f}.toast.good{background:#123021;border-color:#245b3d}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.explosion{pointer-events:none;position:fixed;inset:0;z-index:80;opacity:0;background:radial-gradient(circle at 50% 50%,#fff8c8 0,#ff9d42 8%,rgba(255,62,42,.86) 19%,rgba(50,0,0,.4) 42%,transparent 68%)}
.explosion.go{animation:explode .8s ease-out}
@keyframes explode{0%{opacity:0;transform:scale(.2)}16%{opacity:1;transform:scale(1.35)}48%{opacity:.55;transform:scale(1)}100%{opacity:0;transform:scale(1.1)}}
.rulesMini{display:grid;gap:8px;font-size:13px;color:#c9ccd5;line-height:1.55}.rulesMini b{color:white}
@media(max-width:820px){.grid2{grid-template-columns:1fr}.formGrid{grid-template-columns:1fr}.field.full{grid-column:auto}.gameHeader{grid-template-columns:1fr auto}.gameHeader .right{display:none}.actionGrid{grid-template-columns:1fr 1fr}.actionBtn.special{grid-column:1/-1}.roleDesc{max-width:72%}.screen{padding:16px 12px 34px}.heroBox{padding:24px 17px;border-radius:22px}.code{letter-spacing:.08em}.targetGrid{grid-template-columns:1fr}}
@media(max-width:480px){.actionGrid{grid-template-columns:1fr}.actionBtn.special{grid-column:auto}.actionBtn{min-height:82px;flex-direction:row}.actionBtn .ico{font-size:27px}.roleIcon{font-size:58px}.roleDesc{max-width:100%;padding-right:0;margin-top:62px}.gameHeader{grid-template-columns:1fr auto}.timer{width:72px;height:72px}.timer span{font-size:24px}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="toastWrap" id="toastWrap"></div>
<div class="explosion" id="explosion"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getAnalytics, isSupported as analyticsSupported } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js';
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs,
  query, orderBy, onSnapshot, serverTimestamp, runTransaction, writeBatch
} from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBJH4uX1bj0PaEUtMDuYSyJ2GDt6f7Gz6o",
  authDomain: "game-bb5b0.firebaseapp.com",
  projectId: "game-bb5b0",
  storageBucket: "game-bb5b0.firebasestorage.app",
  messagingSenderId: "47848761419",
  appId: "1:47848761419:web:62f872cc443d49411a85ce",
  measurementId: "G-SJBS9DDEPL"
};

const app = initializeApp(firebaseConfig);
analyticsSupported().then((supported) => {
  if (supported) getAnalytics(app);
}).catch(() => {});
const db = getFirestore(app);
const DAY_MS = 60_000;
const NIGHT_RESULT_MS = 8_000;
const DEATHLINK_MS = 15_000;
const ROOMS = 'bombRooms';

const ROLES = {
  soldier: { icon:'💣', name:'폭탄병', color:'rgba(255,77,69,.24)', desc:'기본 직업. 낮마다 폭탄 설치 또는 방어 중 하나를 선택한다.', special:'특수능력 없음' },
  detector: { icon:'📡', name:'폭탄 감지관', color:'rgba(86,205,255,.23)', desc:'현재 자신에게 들어온 폭탄 개수를 확인한 뒤, 폭탄 설치 또는 방어를 선택할 수 있다.', special:'폭탄 스캔 · 3회' },
  phoenix: { icon:'🔥', name:'불사조', color:'rgba(255,127,54,.25)', desc:'처음 사망할 때 자동으로 한 번 부활한다. 부활 후에는 평범하게 사망한다.', special:'자동 부활 · 1회' },
  guardian: { icon:'🛡️', name:'수호대장', color:'rgba(70,160,255,.23)', desc:'방어를 선택하면 자신과 직접 지정한 생존자 1명에게 그날 밤 실드를 적용한다.', special:'동반 방어 · 상시' },
  double: { icon:'💣💣', name:'쌍폭탄병', color:'rgba(255,73,87,.25)', desc:'특수능력 사용 시 서로 다른 생존자 2명에게 폭탄을 하나씩 설치한다.', special:'더블 타깃 · 3회' },
  piercer: { icon:'🔩', name:'철갑폭격수', color:'rgba(210,210,220,.20)', desc:'특수능력으로 방어와 수호대장 실드를 100% 관통하는 철갑 폭탄을 설치한다.', special:'관통 폭탄 · 3회' },
  deathlinker: { icon:'☠️', name:'데스링커', color:'rgba(178,110,255,.24)', desc:'자신이 사망하면 밤이 멈춘다. 살아 있는 1명을 직접 지정해 함께 죽인다.', special:'저승길 동행 · 사망 시' },
  mirror: { icon:'🪞', name:'미러맨', color:'rgba(111,222,232,.20)', desc:'방어에 성공하면 자신에게 폭탄을 심은 사람 중 무작위 1명에게 폭탄 1개를 즉시 반사한다.', special:'폭탄 반사 · 자동' },
  deathjoker: { icon:'🤡', name:'데스조커', color:'rgba(255,88,194,.22)', desc:'한밤에 폭탄 2개 이상이 동시에 폭발하여 사망하면 즉시 개인 승리한다. 폭탄 1개 사망은 탈락이다.', special:'특수 승리 조건' },
  peacemaker: { icon:'🕊️', name:'피스메이커', color:'rgba(240,238,205,.18)', desc:'폭탄 공격을 할 수 없다. 최종 3인까지 살아남는 순간 개인 승리하고 게임에서 빠진다.', special:'최종 3인 개인 승리' }
};
const SPECIAL_ROLES = ['detector','phoenix','guardian','double','piercer','deathlinker','mirror','deathjoker','peacemaker'];

const state = {
  roomCode:'', playerId:'', room:null, players:[], roomUnsub:null, playersUnsub:null,
  timerBusy:false, lastPhase:null, lastNightStamp:'', modal:null
};

const appEl = document.getElementById('app');
const modalRoot = document.getElementById('modalRoot');
const toastWrap = document.getElementById('toastWrap');
const explosionEl = document.getElementById('explosion');

const escapeHtml = (v='') => String(v).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const randomId = () => (crypto.randomUUID?.() || `${Date.now()}-${Math.random()}`).replace(/-/g,'').slice(0,20);
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
const roomRef = () => doc(db, ROOMS, state.roomCode);
const playersRef = () => collection(db, ROOMS, state.roomCode, 'players');
const playerRef = id => doc(db, ROOMS, state.roomCode, 'players', id);
const me = () => state.players.find(p=>p.id===state.playerId) || null;
const alivePlayers = () => state.players.filter(p=>p.alive);
const role = id => ROLES[id] || ROLES.soldier;
const isHost = () => state.room?.hostId === state.playerId;

function toast(message,type=''){
  const el=document.createElement('div'); el.className=`toast ${type}`; el.textContent=message;
  toastWrap.appendChild(el); setTimeout(()=>el.remove(),3400);
}
function boomFx(){
  explosionEl.classList.remove('go'); void explosionEl.offsetWidth; explosionEl.classList.add('go');
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    const ctx=new AC(); const o=ctx.createOscillator(); const g=ctx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(100,ctx.currentTime); o.frequency.exponentialRampToValueAtTime(28,ctx.currentTime+.5);
    g.gain.setValueAtTime(.18,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.65);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+.68);
  }catch(e){}
}
function saveSession(){ localStorage.setItem('bombNightSession',JSON.stringify({roomCode:state.roomCode,playerId:state.playerId})); }
function clearSession(){ localStorage.removeItem('bombNightSession'); }
function phaseLabel(p){ return p==='day'?'낮 ☀️':p==='night'?'밤 🌙':p==='deathlink'?'저승의 선택 ☠️':p==='ended'?'게임 종료':'대기실'; }
function actionLabel(p){
  if(!p || p.actionRound!==state.room?.round) return '미선택';
  return ({bomb:'💣 폭탄 설치',defend:'🛡️ 방어',double:'💣💣 더블 타깃',pierce:'🔩 철갑 폭탄'})[p.actionType] || '선택 완료';
}
function appendActivityLog(base,events,round){
  const stamp=Date.now();
  const added=(events||[]).map((e,i)=>({round,kind:e.kind||'',text:e.text||'',at:stamp+i}));
  return [...(base||[]),...added].slice(-120);
}
function hostSafeActivityText(text=''){
  let t=String(text);
  const nameFrom=(pattern)=>t.match(pattern)?.[1]||'플레이어';
  if(t.includes('불사조 부활')||t.includes('동반 사망 직전 불사조 부활')) return `🔥 ${nameFrom(/🔥\s*([^·]+?)(?:\s*·|가|\s*$)/)}가 사망 위기에서 살아남았습니다.`;
  if(t.includes('데스조커 개인 승리')||t.includes('피스메이커 개인 승리')) return `🏆 ${nameFrom(/(?:🤡|🕊️)\s*([^·]+?)\s*·/)}가 특수 승리 조건을 달성했습니다.`;
  if(t.includes('미러 반사')){
    const m=t.match(/🪞\s*([^의]+)의 미러 반사 → (.+)$/);
    return m?`✨ ${m[1]}의 특수 효과가 ${m[2]}에게 적용되었습니다.`:'✨ 특수 효과가 발동했습니다.';
  }
  return t.replace(/데스링커/g,'플레이어').replace(/불사조/g,'특수 효과').replace(/데스조커/g,'특수 승리').replace(/피스메이커/g,'특수 승리').replace(/미러/g,'특수 효과');
}

async function createRoom(){
  const name=document.getElementById('createName')?.value.trim();
  if(!name){ toast('닉네임을 입력해 주세요.','error'); return; }
  try{
    let code='';
    for(let i=0;i<8;i++){
      code=String(Math.floor(100000+Math.random()*900000));
      if(!(await getDoc(doc(db,ROOMS,code))).exists()) break;
    }
    const pid=randomId(); const now=Date.now();
    await setDoc(doc(db,ROOMS,code),{
      code, hostId:pid, hostName:name, status:'waiting', phase:'waiting', round:0,
      phaseEndsAt:0, playerCount:0, nextSeat:1, resolving:false, resolutionOwner:'', resolutionClaimedAt:0,
      winners:[], nightResult:null, activityLog:[], pendingDeathlink:null, createdAt:serverTimestamp(), updatedAt:now
    });
    state.roomCode=code; state.playerId=pid; saveSession(); enterRoom();
  }catch(e){ console.error(e); toast(`방 생성 실패: ${friendlyError(e)}`,'error'); }
}

function freshPlayer(name,seat){
  return { name, seat, alive:true, role:'soldier', usesLeft:0, phoenixUsed:false, personalWin:false, finalWinner:false,
    actionRound:0, actionType:'', actionTargets:[], actionAt:0, scanRound:0, scanCount:0, joinedAt:Date.now() };
}

async function joinRoom(){
  const name=document.getElementById('joinName')?.value.trim();
  const code=document.getElementById('joinCode')?.value.replace(/\D/g,'').slice(0,6);
  if(!name || code?.length!==6){ toast('닉네임과 6자리 방 코드를 확인해 주세요.','error'); return; }
  try{
    const rr=doc(db,ROOMS,code); const roomSnap=await getDoc(rr);
    if(!roomSnap.exists()) throw new Error('존재하지 않는 방입니다.');
    const room=roomSnap.data(); if(room.status!=='waiting') throw new Error('이미 게임이 시작된 방입니다.');
    const ps=await getDocs(collection(db,ROOMS,code,'players'));
    if(ps.docs.some(d=>d.data().name===name)) throw new Error('같은 닉네임이 이미 있습니다.');
    const pid=randomId();
    const seat=await runTransaction(db,async tx=>{
      const snap=await tx.get(rr); if(!snap.exists()) throw new Error('방이 사라졌습니다.');
      const r=snap.data(); if(r.status!=='waiting') throw new Error('게임이 시작되었습니다.');
      if((r.playerCount||0)>=16) throw new Error('최대 16명까지 입장할 수 있습니다.');
      const s=r.nextSeat||((r.playerCount||0)+1);
      tx.update(rr,{playerCount:(r.playerCount||0)+1,nextSeat:s+1,updatedAt:Date.now()}); return s;
    });
    await setDoc(doc(db,ROOMS,code,'players',pid),freshPlayer(name,seat));
    state.roomCode=code; state.playerId=pid; saveSession(); enterRoom();
  }catch(e){ console.error(e); toast(friendlyError(e),'error'); }
}

function friendlyError(e){
  const m=e?.message||String(e);
  if(m.includes('permission-denied')||m.includes('Missing or insufficient permissions')) return 'Firebase 권한이 없습니다. 함께 제공한 Firestore 규칙을 확인해 주세요.';
  return m.replace('FirebaseError: ','');
}

function leaveLocal(){
  state.roomUnsub?.(); state.playersUnsub?.(); state.roomUnsub=null; state.playersUnsub=null;
  state.roomCode=''; state.playerId=''; state.room=null; state.players=[]; clearSession(); renderHome();
}

async function restoreSession(){
  try{
    const s=JSON.parse(localStorage.getItem('bombNightSession')||'null'); if(!s?.roomCode||!s?.playerId) return renderHome();
    const r=await getDoc(doc(db,ROOMS,s.roomCode));
    if(!r.exists()){ clearSession(); return renderHome(); }
    const roomData=r.data();
    if(roomData.hostId!==s.playerId){
      const p=await getDoc(doc(db,ROOMS,s.roomCode,'players',s.playerId));
      if(!p.exists()){ clearSession(); return renderHome(); }
    }
    state.roomCode=s.roomCode; state.playerId=s.playerId; enterRoom();
  }catch(e){ clearSession(); renderHome(); }
}

function enterRoom(){
  state.roomUnsub?.(); state.playersUnsub?.();
  state.roomUnsub=onSnapshot(roomRef(),snap=>{
    if(!snap.exists()){ toast('💥 방장이 게임을 종료했습니다. 처음 화면으로 이동합니다.','error'); leaveLocal(); return; }
    const prevPhase=state.room?.phase; const prevStamp=state.room?.nightResult?.stamp;
    state.room={id:snap.id,...snap.data()};
    if(prevPhase!==state.room.phase && state.room.phase==='night') boomFx();
    if(state.room.nightResult?.stamp && state.room.nightResult.stamp!==prevStamp && state.room.nightResult.events?.some(x=>x.kind==='boom')) boomFx();
    render();
  },e=>toast(friendlyError(e),'error'));
  state.playersUnsub=onSnapshot(query(playersRef(),orderBy('seat')),snap=>{
    state.players=snap.docs.map(d=>({id:d.id,...d.data()})); render();
  },e=>toast(friendlyError(e),'error'));
}

async function destroyRoomAndGoHome(){
  if(!isHost() || !state.room) return;
  const ok=window.confirm('현재 게임을 폭파하고 모든 참가자를 처음 화면으로 이동시킬까요?');
  if(!ok) return;
  try{
    const snap=await getDocs(playersRef());
    const batch=writeBatch(db);
    snap.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(roomRef());
    await batch.commit();
    boomFx();
    toast('💥 게임 방을 폭파했습니다.','good');
    leaveLocal();
  }catch(e){
    console.error(e);
    toast(`방 종료 실패: ${friendlyError(e)}`,'error');
  }
}

async function startGame(){
  if(!isHost()) return;
  try{
    const snap=await getDocs(query(playersRef(),orderBy('seat'))); const ps=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(ps.length<3||ps.length>16) throw new Error('게임은 3명부터 16명까지 시작할 수 있습니다.');
    const shuffledPlayers=shuffle(ps); const specialCount=Math.min(SPECIAL_ROLES.length,ps.length-1);
    const selected=shuffle(SPECIAL_ROLES).slice(0,specialCount);
    const assignments=new Map(); shuffledPlayers.forEach((p,i)=>assignments.set(p.id,selected[i]||'soldier'));
    const batch=writeBatch(db);
    ps.forEach(p=>{
      const rid=assignments.get(p.id); const uses=['detector','double','piercer'].includes(rid)?3:0;
      batch.update(playerRef(p.id),{alive:true,role:rid,usesLeft:uses,phoenixUsed:false,personalWin:false,finalWinner:false,
        actionRound:0,actionType:'',actionTargets:[],actionAt:0,scanRound:0,scanCount:0});
    });
    batch.update(roomRef(),{status:'game',phase:'day',round:1,phaseEndsAt:Date.now()+DAY_MS,resolving:false,resolutionOwner:'',resolutionClaimedAt:0,
      winners:[],nightResult:null,activityLog:[],pendingDeathlink:null,updatedAt:Date.now()});
    await batch.commit(); toast('게임 시작! 직업이 비밀 배정되었습니다.','good');
  }catch(e){ console.error(e); toast(friendlyError(e),'error'); }
}

async function commitAction(type,targets=[]){
  try{
    await runTransaction(db,async tx=>{
      const rr=roomRef(), pr=playerRef(state.playerId); const [rs,ps]=await Promise.all([tx.get(rr),tx.get(pr)]);
      if(!rs.exists()||!ps.exists()) throw new Error('게임 정보를 찾을 수 없습니다.');
      const r=rs.data(), p=ps.data();
      if(r.phase!=='day'||r.status!=='game'||Date.now()>=r.phaseEndsAt) throw new Error('낮 행동 시간이 끝났습니다.');
      if(!p.alive) throw new Error('탈락한 플레이어는 행동할 수 없습니다.');
      if(p.actionRound===r.round) throw new Error('이번 라운드 행동은 이미 확정했습니다.');
      let uses=p.usesLeft||0;
      if(type==='double'&&p.role!=='double') throw new Error('사용할 수 없는 능력입니다.');
      if(type==='pierce'&&p.role!=='piercer') throw new Error('사용할 수 없는 능력입니다.');
      if(type==='double'||type==='pierce'){ if(uses<=0) throw new Error('특수능력 사용 횟수를 모두 소모했습니다.'); uses--; }
      if(type==='bomb'&&p.role==='peacemaker') throw new Error('피스메이커는 폭탄 공격을 할 수 없습니다.');
      tx.update(pr,{actionRound:r.round,actionType:type,actionTargets:targets,actionAt:Date.now(),usesLeft:uses});
    });
    closeModal(); toast('행동이 확정되었습니다.','good');
  }catch(e){ console.error(e); toast(friendlyError(e),'error'); }
}

async function scanBombs(){
  try{
    const r=state.room, p=me(); if(!r||!p) return;
    if(r.phase!=='day'||Date.now()>=r.phaseEndsAt) throw new Error('낮 행동 시간이 끝났습니다.');
    const ps=await getDocs(playersRef()); let count=0;
    ps.docs.forEach(d=>{
      const a=d.data(); if(a.actionRound!==r.round) return;
      if(['bomb','double','pierce'].includes(a.actionType)) count += (a.actionTargets||[]).filter(id=>id===state.playerId).length;
    });
    await runTransaction(db,async tx=>{
      const rr=roomRef(), pr=playerRef(state.playerId); const [rs,meSnap]=await Promise.all([tx.get(rr),tx.get(pr)]);
      const room=rs.data(), cur=meSnap.data();
      if(room.phase!=='day'||Date.now()>=room.phaseEndsAt) throw new Error('낮 행동 시간이 끝났습니다.');
      if(cur.role!=='detector'||(cur.usesLeft||0)<=0) throw new Error('스캔 사용 횟수가 없습니다.');
      if(cur.scanRound===room.round) throw new Error('이번 라운드에는 이미 스캔했습니다.');
      tx.update(pr,{usesLeft:(cur.usesLeft||0)-1,scanRound:room.round,scanCount:count});
    });
    toast(`📡 지금 감지된 폭탄은 ${count}개입니다.`,'good');
  }catch(e){ console.error(e); toast(friendlyError(e),'error'); }
}

function chooseBomb(){ openTargetModal('폭탄을 심을 사람','오늘 밤 이 플레이어의 폭탄이 폭발합니다.',1,ids=>commitAction('bomb',ids)); }
function chooseDefend(){
  const p=me(); if(p?.role==='guardian') openTargetModal('함께 보호할 1명','나에게는 자동으로 실드가 적용됩니다. 추가로 보호할 생존자 1명을 선택하세요.',1,ids=>commitAction('defend',ids));
  else commitAction('defend',[]);

function useSpecial(){
  const p=me(); if(!p) return;
  if(p.role==='detector') return scanBombs();
  if(p.role==='double') return openTargetModal('폭탄을 심을 2명','서로 다른 생존자 2명을 선택하세요.',2,ids=>commitAction('double',ids));
  if(p.role==='piercer') return openTargetModal('철갑 폭탄 목표','이 폭탄은 방어를 100% 관통합니다.',1,ids=>commitAction('pierce',ids));
  toast('이 직업의 특수능력은 자동 또는 방어 연계로 발동합니다.');

function openTargetModal(title,desc,count,callback){

function closeModal(){ state.modal=null; modalRoot.innerHTML=''; }
function renderModal(){

  modalRoot.innerHTML=`<div class="modalWrap" data-act="modal-bg"><div class="modal">
    <h3>${escapeHtml(m.title)}</h3><p>${escapeHtml(m.desc)} · ${m.count}명 선택</p>
    <div class="targetGrid">${targets.map(p=>`<button class="targetBtn ${m.selected.includes(p.id)?'selected':''}" data-target="${p.id}"><b>${p.seat}번 · ${escapeHtml(p.name)}</b></button>`).join('')}</div>
    <div class="modalActions"><button class="btn ghost" data-act="modal-cancel">취소</button><button class="btn primary" data-act="modal-confirm" ${m.selected.length!==m.count?'disabled':''}>선택 확정</button></div>
  </div></div>`;

async function claimNightResolution(forceRecovery=false){
  if(state.timerBusy||!state.room) return; state.timerBusy=true;
  try{
    const won=await runTransaction(db,async tx=>{
      const rr=roomRef(); const s=await tx.get(rr); if(!s.exists()) return false; const r=s.data(); const now=Date.now();
      const recover=forceRecovery&&r.phase==='night'&&r.resolving&&now-(r.resolutionClaimedAt||0)>20_000;
      const normal=r.phase==='day'&&r.status==='game'&&now>=r.phaseEndsAt&&!r.resolving;
      if(!normal&&!recover) return false;
      tx.update(rr,{phase:'night',resolving:true,resolutionOwner:state.playerId,resolutionClaimedAt:now,phaseEndsAt:now+30_000}); return true;
    });
    if(won) await resolveNight();
  }catch(e){ console.error(e); }
  finally{ state.timerBusy=false; }
}

async function resolveNight(){
  const rs=await getDoc(roomRef()); if(!rs.exists()) return; const room=rs.data();
  if(room.resolutionOwner!==state.playerId||room.phase!=='night'||!room.resolving) return;
  const snap=await getDocs(query(playersRef(),orderBy('seat'))); const ps=snap.docs.map(d=>({id:d.id,...d.data()}));
  const byId=new Map(ps.map(p=>[p.id,p])); const round=room.round; const shields=new Set(); const bombs=new Map();
  const events=[]; const winners=[...(room.winners||[])]; const changed=new Map();
  const touch=id=>{ if(!changed.has(id)) changed.set(id,{}); return changed.get(id); };
  const addBomb=(target,b)=>{ if(!bombs.has(target)) bombs.set(target,[]); bombs.get(target).push(b); };

  ps.filter(p=>p.alive&&p.actionRound===round).forEach(p=>{
    if(p.actionType==='defend'){
      shields.add(p.id);
      if(p.role==='guardian'&&p.actionTargets?.[0]&&byId.get(p.actionTargets[0])?.alive) shields.add(p.actionTargets[0]);
    }
  });
  ps.filter(p=>p.alive&&p.actionRound===round).forEach(p=>{
    if(p.actionType==='bomb'&&p.actionTargets?.[0]) addBomb(p.actionTargets[0],{from:p.id,piercing:false,kind:'normal'});
    if(p.actionType==='double') (p.actionTargets||[]).forEach(t=>addBomb(t,{from:p.id,piercing:false,kind:'double'}));
    if(p.actionType==='pierce'&&p.actionTargets?.[0]) addBomb(p.actionTargets[0],{from:p.id,piercing:true,kind:'pierce'});
  });

  const deathCandidates=new Map();
  const overheat=round>=8;
  for(const [targetId,list] of bombs){
    const target=byId.get(targetId); if(!target?.alive) continue;
    const shielded=shields.has(targetId); let penetrated=!shielded; let pierceCount=0;
    if(shielded){
      for(const b of list){
        if(b.piercing){ penetrated=true; pierceCount++; break; }
        if(overheat&&Math.random()<.5){ penetrated=true; pierceCount++; break; }
      }
    }
    if(penetrated){ deathCandidates.set(targetId,{cause:'bomb',bombCount:list.length}); events.push({kind:'boom',text:`💥 ${target.name} · 폭탄 ${list.length}개 폭발${shielded?' · 방어 관통':''}`}); }
    else events.push({kind:'safe',text:`🛡️ ${target.name} · 폭탄 ${list.length}개를 방어했다`});
  }

  // 미러맨: 성공적으로 막아낸 밤에 공격자 1명에게 일반 폭탄 1개 즉시 반사. 반사 연쇄는 발생하지 않는다.
  for(const p of ps){
    if(!p.alive||p.role!=='mirror'||deathCandidates.has(p.id)||!shields.has(p.id)) continue;
    const incoming=bombs.get(p.id)||[]; if(!incoming.length) continue;
    const attackers=[...new Set(incoming.map(b=>b.from))].filter(id=>byId.get(id)?.alive);
    if(!attackers.length) continue;
    const attackerId=attackers[Math.floor(Math.random()*attackers.length)]; const attacker=byId.get(attackerId);
    let reflectedKills=!shields.has(attackerId); if(shields.has(attackerId)&&overheat&&Math.random()<.5) reflectedKills=true;
    events.push({kind:'boom',text:`🪞 ${p.name}의 미러 반사 → ${attacker.name}`});
    if(reflectedKills&&!deathCandidates.has(attackerId)) deathCandidates.set(attackerId,{cause:'bomb',bombCount:1,reflected:true});
    else if(!reflectedKills) events.push({kind:'safe',text:`🛡️ ${attacker.name}이 반사 폭탄을 방어했다`});
  }

  let deadDeathlinker=null;
  for(const [id,cause] of deathCandidates){
    const p=byId.get(id); if(!p?.alive) continue;
    if(p.role==='phoenix'&&!p.phoenixUsed){ touch(id).phoenixUsed=true; p.phoenixUsed=true; events.push({kind:'safe',text:`🔥 ${p.name} · 불사조 부활!`}); continue; }
    if(p.role==='deathjoker'&&cause.cause==='bomb'&&cause.bombCount>=2){
      touch(id).alive=false; touch(id).personalWin=true; p.alive=false; p.personalWin=true;
      addWinner(winners,p,'🤡 데스조커 개인 승리'); events.push({kind:'win',text:`🤡 ${p.name} · 폭탄 ${cause.bombCount}개 동시 폭사! 데스조커 개인 승리`}); continue;
    }
    touch(id).alive=false; p.alive=false; events.push({kind:'boom',text:`☠️ ${p.name} 사망`});
    if(p.role==='deathlinker') deadDeathlinker=p;
  }

  if(deadDeathlinker){
    const batch=writeBatch(db);
    for(const [id,data] of changed) batch.update(playerRef(id),data);
    const deadline=Date.now()+DEATHLINK_MS;
    batch.update(roomRef(),{phase:'deathlink',resolving:false,resolutionOwner:'',resolutionClaimedAt:0,phaseEndsAt:deadline,
      winners,nightResult:{stamp:`${round}-${Date.now()}`,round,events},activityLog:appendActivityLog(room.activityLog,events,round),pendingDeathlink:{sourceId:deadDeathlinker.id,selectedTargetId:'',deadline},updatedAt:Date.now()});
    await batch.commit(); return;
  }
  applyPeacemakerAndOutcome(ps,winners,events,changed);
  const outcome=buildOutcome(ps,winners);
  const batch=writeBatch(db);
  for(const [id,data] of changed) batch.update(playerRef(id),data);
  batch.update(roomRef(),outcome.ended?{
    status:'ended',phase:'ended',resolving:false,resolutionOwner:'',resolutionClaimedAt:0,phaseEndsAt:0,winners:outcome.winners,
    nightResult:{stamp:`${round}-${Date.now()}`,round,events},activityLog:appendActivityLog(room.activityLog,events,round),pendingDeathlink:null,updatedAt:Date.now()
  }:{
    phase:'night',resolving:false,resolutionOwner:'',resolutionClaimedAt:0,phaseEndsAt:Date.now()+NIGHT_RESULT_MS,winners:outcome.winners,
    nightResult:{stamp:`${round}-${Date.now()}`,round,events},activityLog:appendActivityLog(room.activityLog,events,round),pendingDeathlink:null,updatedAt:Date.now()
  });
  await batch.commit();
}

function addWinner(winners,p,type){ if(!winners.some(w=>w.playerId===p.id&&w.type===type)) winners.push({playerId:p.id,name:p.name,type}); }
function applyPeacemakerAndOutcome(ps,winners,events,changed){
  let alive=ps.filter(p=>p.alive);
  const peace=alive.find(p=>p.role==='peacemaker'&&!p.personalWin);
  if(peace&&alive.length<=3){
    peace.alive=false; peace.personalWin=true; if(!changed.has(peace.id)) changed.set(peace.id,{});
    Object.assign(changed.get(peace.id),{alive:false,personalWin:true}); addWinner(winners,peace,'🕊️ 피스메이커 개인 승리');
    events.push({kind:'win',text:`🕊️ ${peace.name} · 최종 3인 생존! 피스메이커 개인 승리`});
  }
}
function buildOutcome(ps,winners){
  const alive=ps.filter(p=>p.alive); const out=[...winners];
  if(alive.length<=1){
    if(alive.length===1){ const p=alive[0]; p.finalWinner=true; addWinner(out,p,'🏆 최후의 생존자'); }
    else if(!out.length) out.push({playerId:'none',name:'생존자 없음',type:'💥 전원 폭사'});
    return {ended:true,winners:out};
  }
  return {ended:false,winners:out};
}

    await updateDoc(roomRef(),{'pendingDeathlink.selectedTargetId':targetId,updatedAt:Date.now()}); toast('저승길 동행 대상을 선택했습니다.','good');
  }catch(e){ toast(friendlyError(e),'error'); }
}

async function claimDeathlinkResolution(){
  if(state.timerBusy||!state.room) return; state.timerBusy=true;
  try{
    const won=await runTransaction(db,async tx=>{
      const rr=roomRef(); const s=await tx.get(rr); if(!s.exists()) return false; const r=s.data(); const pd=r.pendingDeathlink; const now=Date.now();
      if(r.phase!=='deathlink'||r.resolving||!pd||(!pd.selectedTargetId&&now<pd.deadline)) return false;
      tx.update(rr,{resolving:true,resolutionOwner:state.playerId,resolutionClaimedAt:now}); return true;
    });
    if(won) await resolveDeathlink();
  }catch(e){ console.error(e); }
  finally{ state.timerBusy=false; }
}

async function resolveDeathlink(){
  const rs=await getDoc(roomRef()); if(!rs.exists()) return; const room=rs.data();
  if(room.phase!=='deathlink'||room.resolutionOwner!==state.playerId||!room.resolving) return;
  const snap=await getDocs(query(playersRef(),orderBy('seat'))); const ps=snap.docs.map(d=>({id:d.id,...d.data()}));
  const source=ps.find(p=>p.id===room.pendingDeathlink?.sourceId); let candidates=ps.filter(p=>p.alive&&p.id!==source?.id);
  let target=ps.find(p=>p.id===room.pendingDeathlink?.selectedTargetId&&p.alive);
  if(!target&&candidates.length) target=candidates[Math.floor(Math.random()*candidates.length)];
  const events=[...(room.nightResult?.events||[])]; const priorEventCount=events.length; const winners=[...(room.winners||[])]; const changed=new Map();
  if(target){
    events.push({kind:'boom',text:`☠️ ${source?.name||'데스링커'}의 선택 → ${target.name} 저승길 동행`});
    if(target.role==='phoenix'&&!target.phoenixUsed){ target.phoenixUsed=true; changed.set(target.id,{phoenixUsed:true}); events.push({kind:'safe',text:`🔥 ${target.name} · 동반 사망 직전 불사조 부활!`}); }
    else { target.alive=false; changed.set(target.id,{alive:false}); events.push({kind:'boom',text:`☠️ ${target.name} 동반 사망`}); }
  }
  applyPeacemakerAndOutcome(ps,winners,events,changed); const outcome=buildOutcome(ps,winners);
  const batch=writeBatch(db); for(const [id,data] of changed) batch.update(playerRef(id),data);
  batch.update(roomRef(),outcome.ended?{
    status:'ended',phase:'ended',resolving:false,resolutionOwner:'',resolutionClaimedAt:0,phaseEndsAt:0,winners:outcome.winners,
    nightResult:{stamp:`${room.round}-${Date.now()}`,round:room.round,events},activityLog:appendActivityLog(room.activityLog,events.slice(priorEventCount),room.round),pendingDeathlink:null,updatedAt:Date.now()
  }:{
    phase:'night',resolving:false,resolutionOwner:'',resolutionClaimedAt:0,phaseEndsAt:Date.now()+NIGHT_RESULT_MS,winners:outcome.winners,
    nightResult:{stamp:`${room.round}-${Date.now()}`,round:room.round,events},activityLog:appendActivityLog(room.activityLog,events.slice(priorEventCount),room.round),pendingDeathlink:null,updatedAt:Date.now()
  });
  await batch.commit();
}

async function claimNextRound(){
  if(state.timerBusy||!state.room) return; state.timerBusy=true;
  try{
    await runTransaction(db,async tx=>{
      const rr=roomRef(); const s=await tx.get(rr); if(!s.exists()) return; const r=s.data();
      if(r.status!=='game'||r.phase!=='night'||r.resolving||Date.now()<r.phaseEndsAt) return;
      tx.update(rr,{phase:'day',round:(r.round||0)+1,phaseEndsAt:Date.now()+DAY_MS,nightResult:null,pendingDeathlink:null,updatedAt:Date.now()});
    });
  }catch(e){ console.error(e); }
  finally{ state.timerBusy=false; }
}

function tick(){
  const r=state.room; if(!r) return;
  const remain=Math.max(0,Math.ceil(((r.phaseEndsAt||0)-Date.now())/1000));
  const timer=document.querySelector('[data-timer]'); if(timer) timer.textContent=String(remain).padStart(2,'0');
  if(r.status!=='game') return;
  if(r.phase==='day'&&Date.now()>=r.phaseEndsAt) claimNightResolution(false);
  else if(r.phase==='night'){
    if(r.resolving&&Date.now()-(r.resolutionClaimedAt||0)>20_000) claimNightResolution(true);
    else if(!r.resolving&&Date.now()>=r.phaseEndsAt) claimNextRound();
  } else if(r.phase==='deathlink'&&(r.pendingDeathlink?.selectedTargetId||Date.now()>=(r.pendingDeathlink?.deadline||0))) claimDeathlinkResolution();
}
setInterval(tick,300);

        <div style="height:18px"></div>

      </div></aside>

function renderPlayers(lobby=false){
  const r=state.room;
  return state.players.map(p=>`<div class="playerRow ${!p.alive&&!lobby?'dead':''}"><div class="seat">${p.seat}</div><div class="playerName">${escapeHtml(p.name)}${p.id===state.playerId?' <span style="color:var(--blue)">· 나</span>':''}</div><div class="playerMeta">
    ${!lobby&&!p.alive?'<span class="tag dead">탈락</span>':''}
    ${!lobby&&r?.phase==='day'&&p.alive&&p.actionRound===r.round?'<span class="tag ready">선택 완료</span>':''}
  </div></div>`).join('');
}

function renderHostGame(){
  const r=state.room; const remain=Math.max(0,Math.ceil(((r.phaseEndsAt||0)-Date.now())/1000));
  const ordered=[...state.players].sort((a,b)=>a.seat-b.seat);
  const activities=[...(r.activityLog||[])].sort((a,b)=>(b.at||0)-(a.at||0));
  const selectionRows=r.status==='game'&&r.phase==='day' ? ordered.filter(p=>p.alive).map(p=>`<div class="logItem ${p.actionRound===r.round?'safe':''}">${p.actionRound===r.round?'✅':'⏳'} ${escapeHtml(p.name)} · ${p.actionRound===r.round?'행동 선택 완료':'선택 대기 중'}</div>`).join('') : '';
  appEl.innerHTML=`<main class="screen">${renderBrand()}
    <div class="topbar"><div><div class="round">ROUND ${r.round||'-'} · ${phaseLabel(r.phase)}</div><div style="font-size:13px;color:var(--muted);margin-top:4px">방장 관전 화면 · 직업 및 행동 종류 비공개</div></div><button class="btn danger small" data-act="destroy-room">💥 처음으로 가기</button></div>
    ${r.round>=8&&r.status==='game'?'<div class="overheat">🔥 폭탄 과열 · 모든 일반 폭탄이 각각 50% 확률로 실드를 관통합니다</div>':''}
    <div class="grid2">
      <section class="card"><div class="cardPad"><div class="sectionTitle"><h3>👥 학생 생존 현황</h3><span>${alivePlayers().length} / ${state.players.length}명 생존</span></div><div class="playerList">${ordered.map(p=>`<div class="playerRow ${!p.alive?'dead':''}"><div class="seat">${p.seat}</div><div class="playerName">${escapeHtml(p.name)}</div><div class="playerMeta"><span class="tag ${p.alive?'ready':'dead'}">${p.alive?'생존':'탈락'}</span></div></div>`).join('')}</div></div></section>
      <aside class="card"><div class="cardPad"><div class="sectionTitle"><h3>📋 활동 내역</h3><span>${r.phase==='day'?`${String(remain).padStart(2,'0')}초`:phaseLabel(r.phase)}</span></div>
        <div class="log">${selectionRows}${activities.map(a=>`<div class="logItem ${a.kind||''}"><b>R${a.round}</b> · ${escapeHtml(hostSafeActivityText(a.text))}</div>`).join('')}${!selectionRows&&!activities.length?'<div class="locked"><div class="big">📋</div><b>아직 기록이 없습니다</b><p>밤의 결과와 학생 선택 완료 현황이 여기에 표시됩니다.</p></div>':''}</div>
      </div></aside>
    </div>
  </main>`;
}

function renderGame(){
  const r=state.room;
  if(isHost()) return renderHostGame();
  const p=me(); if(!p) return;
  const rr=role(p.role); const remain=Math.max(0,Math.ceil(((r.phaseEndsAt||0)-Date.now())/1000));
  appEl.innerHTML=`<main class="screen">${renderBrand()}
    <div class="topbar"><div style="display:flex;gap:8px;flex-wrap:wrap"><div class="roomPill">ROOM <b>${r.code}</b></div><div class="roomPill">생존 <b>${alivePlayers().length}</b> / ${state.players.length}</div></div></div>
    ${r.round>=8&&r.status==='game'?'<div class="overheat">🔥 폭탄 과열 · 모든 일반 폭탄이 각각 50% 확률로 실드를 관통합니다</div>':''}
    <div class="gameHeader"><div><div class="round">ROUND ${r.round||'-'}</div><div class="phase ${r.phase==='day'?'day':r.phase==='deathlink'?'death':'night'}">${phaseLabel(r.phase)}</div></div><div class="timer"><span data-timer>${String(remain).padStart(2,'0')}</span></div><div class="right" style="text-align:right;color:var(--muted);font-size:13px">${r.phase==='day'?'모든 행동은 비공개입니다.':'밤의 결과를 확인하세요.'}</div></div>
    <div class="grid2"><section>
      ${!p.alive&&r.status!=='ended'?'<div class="deadOverlay">☠️ 당신은 현재 탈락 상태입니다. 게임 진행을 관전할 수 있습니다.</div>':''}
      <div class="roleCard" style="--roleGlow:${rr.color}"><div class="roleIcon">${rr.icon}</div><div><div class="roleKicker">YOUR SECRET ROLE</div><div class="roleName">${rr.name}</div><div class="roleDesc">${rr.desc}</div></div><div class="roleFoot"><span class="uses">${rr.special}</span>${['detector','double','piercer'].includes(p.role)?`<span class="uses">남은 사용 ${p.usesLeft}회</span>`:''}${p.role==='phoenix'?`<span class="uses">부활 ${p.phoenixUsed?'사용 완료':'대기 중'}</span>`:''}</div></div>
      ${renderActionPanel(p,r)}
      ${renderNightLog(r)}

  </main>`;
}

function renderActionPanel(p,r){
  if(r.status==='ended') return renderEnded();
  if(r.phase==='deathlink'){
    if(r.pendingDeathlink?.sourceId===state.playerId&&!r.pendingDeathlink?.selectedTargetId){
      const targets=alivePlayers().filter(x=>x.id!==state.playerId);
      return `<div class="actionCard"><div class="actionTitle">☠️ 저승길에 함께 갈 1명을 선택하세요</div><div class="actionHint">15초 안에 고르지 않으면 무작위 생존자가 선택됩니다.</div><div class="targetGrid">${targets.map(x=>`<button class="targetBtn" data-deathlink="${x.id}">${x.seat}번 · ${escapeHtml(x.name)}</button>`).join('')}</div></div>`;
    }
    return `<div class="actionCard"><div class="locked"><div class="big">☠️</div><b>데스링커의 선택을 기다리는 중</b><p>누군가 저승길 동행 대상을 고르고 있습니다.</p></div></div>`;
  }
  if(r.phase!=='day') return `<div class="actionCard"><div class="locked"><div class="big">🌙</div><b>${r.resolving?'폭탄 판정 중...':'밤의 결과 확인 중'}</b><p>잠시 후 다음 낮이 시작됩니다.</p></div></div>`;
  if(!p.alive) return '';
  const acted=p.actionRound===r.round;
  if(acted) return `<div class="actionCard"><div class="locked"><div class="big">🔒</div><b>${actionLabel(p)}</b><p>이번 라운드 행동이 확정되었습니다. 밤이 될 때까지 기다리세요.</p></div></div>`;
  const scanned=p.role==='detector'&&p.scanRound===r.round;
  const specialInfo = p.role==='detector' ? `스캔 ${p.usesLeft}회 남음` : ['double','piercer'].includes(p.role) ? `${p.usesLeft}회 남음` : '자동/연계 능력';
  const specialDisabled = !['detector','double','piercer'].includes(p.role) || (['detector','double','piercer'].includes(p.role)&&(p.usesLeft||0)<=0) || scanned;
  return `<div class="actionCard">
    <div class="actionTitle">오늘 낮의 행동을 선택하세요</div><div class="actionHint">행동은 한 번 확정하면 바꿀 수 없습니다. 미선택 상태로 60초가 지나면 아무 행동도 하지 않습니다.</div>
    ${scanned?`<div class="scanResult">📡 스캔 당시 나에게 들어온 폭탄: ${p.scanCount}개 · 이제 폭탄 설치 또는 방어를 선택하세요.</div>`:''}
    <div class="actionGrid">
      <button class="actionBtn attack" data-act="bomb" ${p.role==='peacemaker'?'disabled':''}><span class="ico">💣</span><span>폭탄 설치</span><small>${p.role==='peacemaker'?'피스메이커 사용 불가':'1명에게 오늘 밤 폭발'}</small></button>
      <button class="actionBtn defend" data-act="defend"><span class="ico">🛡️</span><span>방어</span><small>${p.role==='guardian'?'나 + 지정 1명 실드':'오늘 밤 나에게 실드'}</small></button>
      <button class="actionBtn special" data-act="special" ${specialDisabled?'disabled':''}><span class="ico">✨</span><span>특수능력</span><small>${specialInfo}</small></button>
    </div>
  </div>`;
}

function renderNightLog(r){
  if(r.status==='ended') return '';
  const events=r.nightResult?.events||[]; if(!events.length) return '';
  return `<div class="actionCard"><div class="sectionTitle"><h3>🌙 ROUND ${r.nightResult.round} 밤의 기록</h3><span>${events.length}건</span></div><div class="log">${events.map(e=>`<div class="logItem ${e.kind||''}">${escapeHtml(e.text)}</div>`).join('')}</div></div>`;
}

function renderEnded(){
  const winners=state.room?.winners||[];
  return `<div class="actionCard winnerBox"><div class="trophy">🏆</div><h2>게임 종료</h2><p style="color:var(--muted)">폭발이 멈췄습니다. 승리 결과를 확인하세요.</p><div class="winnerList">${winners.map(w=>`<div class="winner"><div>${escapeHtml(w.type)}</div><div style="font-size:21px;margin-top:4px">${escapeHtml(w.name)}</div></div>`).join('')||'<div class="winner">승리자 없음</div>'}</div>${isHost()?'<button class="btn primary" data-act="start">같은 방에서 다시 시작</button>':''}</div>`;
}

appEl.addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]'); if(!btn) return; const a=btn.dataset.act;
  if(a==='create') createRoom(); else if(a==='join') joinRoom(); else if(a==='leave') leaveLocal(); else if(a==='start') startGame();
  else if(a==='destroy-room') destroyRoomAndGoHome();
  else if(a==='bomb') chooseBomb(); else if(a==='defend') chooseDefend(); else if(a==='special') useSpecial();
});
appEl.addEventListener('click',e=>{ const b=e.target.closest('[data-deathlink]'); if(b) selectDeathlinkTarget(b.dataset.deathlink); });
modalRoot.addEventListener('click',e=>{
  if(e.target.closest('[data-act="modal-bg"]')===e.target) closeModal();
  const target=e.target.closest('[data-target]'); if(target&&state.modal){
    const id=target.dataset.target, arr=state.modal.selected; const idx=arr.indexOf(id);
    if(idx>=0) arr.splice(idx,1); else if(arr.length<state.modal.count) arr.push(id); else { arr.shift(); arr.push(id); }
    renderModal(); return;
  }
  const act=e.target.closest('[data-act]')?.dataset.act;
  if(act==='modal-cancel') closeModal();
  if(act==='modal-confirm'&&state.modal?.selected.length===state.modal.count){ const cb=state.modal.callback, ids=[...state.modal.selected]; cb(ids); }
});

document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!state.room){ const code=document.activeElement?.id==='joinCode'; code?joinRoom():createRoom(); } if(e.key==='Escape') closeModal(); });
restoreSession();
</script>
