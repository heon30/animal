<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>수상한 경매장</title>
  <style>
    :root{
      --bg:#11131c; --panel:#1c2030; --panel2:#262c40; --line:#3b435f;
      --text:#f8fafc; --muted:#aeb8d0; --accent:#ffd166; --accent2:#7bdff2;
      --danger:#ff6b6b; --success:#63e6be; --shadow:0 16px 40px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family:Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(123,223,242,.12), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(255,209,102,.12), transparent 28%),
        linear-gradient(160deg,#0d0f16,#151a29 55%,#0c1019);
    }
    button,input{font:inherit}
    button{cursor:pointer}
    .app{width:min(1100px,100%); margin:auto; padding:22px 16px 48px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
    .brand{font-weight:950;font-size:clamp(22px,4vw,34px);letter-spacing:-1px}
    .brand span{color:var(--accent)}
    .connection{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
    .dot{width:9px;height:9px;border-radius:50%;background:#777}
    .dot.on{background:var(--success);box-shadow:0 0 14px var(--success)}
    .panel{
      background:rgba(28,32,48,.94);border:1px solid rgba(255,255,255,.08);
      border-radius:24px;padding:clamp(18px,4vw,30px);box-shadow:var(--shadow);
    }
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .choice{
      padding:28px 22px;border-radius:20px;border:1px solid var(--line);
      background:linear-gradient(160deg,var(--panel2),#1b2030);text-align:left;color:var(--text);
      min-height:190px;transition:.18s transform,.18s border-color;
    }
    .choice:hover{transform:translateY(-3px);border-color:var(--accent)}
    .choice .icon{font-size:44px}.choice h2{margin:12px 0 8px}.choice p{margin:0;color:var(--muted);line-height:1.6}
    h1,h2,h3,p{letter-spacing:-.3px}
    h1{margin:0 0 8px} h2{margin:0 0 12px} h3{margin:0 0 10px}
    .muted{color:var(--muted)} .center{text-align:center}
    .form{display:grid;gap:12px;max-width:520px;margin:18px auto 0}
    label{font-weight:800}
    input{
      width:100%;border:1px solid var(--line);background:#0f1320;color:var(--text);
      padding:15px 16px;border-radius:14px;outline:none;font-weight:750;
    }
    input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(123,223,242,.12)}
    .btn{
      border:0;border-radius:14px;padding:14px 18px;font-weight:900;color:#161616;
      background:var(--accent);box-shadow:0 8px 22px rgba(255,209,102,.16)
    }
    .btn.secondary{background:var(--accent2)}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none}
    .btn.danger{background:var(--danger);color:white}
    .btn.success{background:var(--success)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
    .room-code{font-size:clamp(42px,10vw,78px);font-weight:1000;letter-spacing:8px;color:var(--accent);margin:12px 0}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;background:#101522;border:1px solid var(--line);font-size:13px;font-weight:850}
    .status-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0 18px}
    .player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-top:16px}
    .player-card{padding:14px;border-radius:15px;background:#121725;border:1px solid var(--line)}
    .player-card.done{border-color:var(--success)}
    .player-name{font-weight:900;word-break:break-all}
    .tiny{font-size:12px;color:var(--muted);margin-top:5px}
    .auction-layout{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
    .item-card{text-align:center;padding:25px;border-radius:22px;background:linear-gradient(160deg,#2c334a,#171c2a);border:1px solid var(--line)}
    .item-emoji{font-size:clamp(74px,14vw,120px);filter:drop-shadow(0 10px 12px rgba(0,0,0,.25))}
    .item-name{font-size:clamp(30px,6vw,52px);font-weight:1000;margin:8px 0}
    .clue{color:#dfe5f5;font-size:17px;line-height:1.65;padding:13px;border-radius:14px;background:rgba(0,0,0,.18)}
    .timer-wrap{margin-top:17px}
    .timer{font-size:clamp(42px,9vw,76px);font-weight:1000;font-variant-numeric:tabular-nums}
    .timer.warning{color:var(--danger);animation:pulse .7s infinite alternate}
    .bar{height:12px;background:#0d111c;border-radius:999px;overflow:hidden;border:1px solid #333a50}
    .bar > div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:100%;transition:width .2s linear}
    @keyframes pulse{to{opacity:.55;transform:scale(1.02)}}
    .cash{font-size:30px;font-weight:1000;color:var(--success);margin:8px 0 18px}
    .bid-box{display:grid;gap:10px}
    .quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .quick button{padding:11px 6px;border-radius:11px;border:1px solid var(--line);background:#111725;color:var(--text);font-weight:850}
    .decision{padding:13px;border-radius:13px;text-align:center;font-weight:900;background:#111725;border:1px solid var(--line)}
    .decision.done{border-color:var(--success);color:var(--success)}
    .decision.pass{border-color:var(--muted);color:var(--muted)}
    .progress-big{font-size:clamp(36px,8vw,62px);font-weight:1000;margin:18px 0 4px}
    .reveal-card{
      text-align:center;padding:26px;border-radius:24px;background:
      radial-gradient(circle at 50% 0%,rgba(255,209,102,.22),transparent 38%),
      linear-gradient(160deg,#2d334b,#151a27);border:1px solid var(--accent);
    }
    .tier{display:inline-block;padding:8px 13px;border-radius:999px;background:var(--accent);color:#191919;font-weight:1000;margin:8px}
    .outcome-title{font-size:clamp(29px,6vw,50px);font-weight:1000;margin:12px 0}
    .value{font-size:clamp(36px,7vw,64px);font-weight:1000;color:var(--accent)}
    .profit.plus{color:var(--success)} .profit.minus{color:var(--danger)}

    .flip-area{perspective:1200px;margin-top:18px}
    .flip-card{
      width:min(540px,100%);min-height:380px;margin:0 auto;position:relative;
      transform-style:preserve-3d;transition:transform .85s cubic-bezier(.2,.8,.2,1);
      cursor:pointer;
    }
    .flip-card.locked{cursor:not-allowed}
    .flip-card.flipped{transform:rotateY(180deg)}
    .flip-face{
      position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;padding:26px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:1px solid var(--accent);box-shadow:var(--shadow);
    }
    .flip-front{
      background:
        radial-gradient(circle at 50% 0%,rgba(255,209,102,.24),transparent 40%),
        linear-gradient(160deg,#343d59,#171c2a);
    }
    .flip-back{
      transform:rotateY(180deg);
      background:
        radial-gradient(circle at 50% 0%,rgba(123,223,242,.18),transparent 40%),
        linear-gradient(160deg,#2c334b,#151a27);
    }
    .card-back-pattern{
      width:100%;height:100%;border-radius:18px;border:2px dashed rgba(255,255,255,.18);
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      background:
        linear-gradient(45deg,rgba(255,255,255,.035) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.035) 50%,rgba(255,255,255,.035) 75%,transparent 75%,transparent);
      background-size:28px 28px;
    }
    .mystery-mark{font-size:90px;font-weight:1000;color:var(--accent);line-height:1}
    .flip-hint{margin-top:16px;color:var(--muted);font-weight:900}
    .hidden-until-flip{filter:blur(6px);opacity:.55;user-select:none}

    table{width:100%;border-collapse:collapse;margin-top:16px;background:#111625;border-radius:15px;overflow:hidden}
    th,td{padding:12px 10px;border-bottom:1px solid #2b3248;text-align:left}
    th{color:var(--muted);font-size:13px} td:last-child,th:last-child{text-align:right}
    tr.winner{background:rgba(255,209,102,.12)}
    .rank1{color:var(--accent);font-weight:1000}
    .notice{padding:12px 14px;border-radius:13px;background:#101522;border:1px solid var(--line);color:var(--muted);line-height:1.55}
    .error{display:none;margin-bottom:12px;padding:12px 14px;border-radius:13px;background:rgba(255,107,107,.16);border:1px solid var(--danger);color:#ffd9d9}
    .loading{padding:50px;text-align:center;color:var(--muted)}
    .hide{display:none!important}
    @media(max-width:780px){
      .grid2,.auction-layout{grid-template-columns:1fr}
      .topbar{align-items:flex-start}
      .choice{min-height:auto}
      .app{padding:14px 10px 34px}
      .panel{border-radius:18px}
      th,td{padding:10px 7px;font-size:14px}
    }
  </style>
</head>

  async function generateCode(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    for(let tries=0; tries<12; tries++){
      let code = "";
      for(let i=0;i<5;i++) code += chars[Math.floor(Math.random()*chars.length)];
      if(!(await getDoc(doc(db,"rooms",code))).exists()) return code;
    }
    throw new Error("방 코드를 만들지 못했습니다. 다시 시도해 주세요.");
  }

  async function createRoom(){
    try{
      screen.innerHTML = `<div class="panel loading">방을 만들고 있습니다…</div>`;
      const code = await generateCode();
      await setDoc(doc(db,"rooms",code),{
        hostUid:user.uid, status:"lobby", createdAt:serverTimestamp(),
        startingCash:STARTING_CASH, totalTurns:TOTAL_TURNS, turnIndex:0,
        currentItem:null, deadlineMs:null, reveal:null
      });
      role = "host"; roomCode = code;
      localStorage.setItem("auctionRole",role);
      localStorage.setItem("auctionRoom",roomCode);
      subscribeRoom();
    }catch(err){
      showError(readableError(err)); renderHome();
    }
  }

  async function joinRoom(){
    const code = $("#codeInput").value.trim().toUpperCase();
    const nickname = $("#nickInput").value.trim();
    if(code.length !== 5) return showError("방 코드 5자리를 입력하세요.");
    if(!nickname || nickname.length > 12) return showError("닉네임을 1~12자로 입력하세요.");
    try{
      const rRef = doc(db,"rooms",code);
      const rSnap = await getDoc(rRef);
      if(!rSnap.exists()) return showError("존재하지 않는 방입니다.");
      const r = rSnap.data();
      if(r.status !== "lobby") return showError("이미 게임이 시작된 방입니다.");

      const pSnap = await getDocs(collection(db,"rooms",code,"players"));
      const existing = pSnap.docs.find(d => d.id === user.uid);
      const sameName = pSnap.docs.some(d => d.id !== user.uid && d.data().nickname === nickname);
      if(sameName) return showError("이미 사용 중인 닉네임입니다.");
      if(!existing && pSnap.size >= MAX_PLAYERS) return showError("참가 인원이 17명으로 가득 찼습니다.");

      await setDoc(doc(db,"rooms",code,"players",user.uid),{
        nickname, cash:STARTING_CASH, assetValue:0, items:[],
        done:false, decision:null, bid:0, decidedMs:null,
        joinedAt:serverTimestamp()
      },{merge:false});

      role = "player"; roomCode = code;
      localStorage.setItem("auctionRole",role);
      localStorage.setItem("auctionRoom",roomCode);
      subscribeRoom();
    }catch(err){ showError(readableError(err)); }
  }

  function subscribeRoom(){
    cleanupSubs();
    const rRef = doc(db,"rooms",roomCode);
    roomUnsub = onSnapshot(rRef, snap => {
      if(!snap.exists()){ showError("방이 삭제되었거나 존재하지 않습니다."); return goHome(); }
      roomData = {id:snap.id,...snap.data()};
      renderCurrent();
    }, err => { showError(readableError(err)); goHome(); });

    playersUnsub = onSnapshot(collection(db,"rooms",roomCode,"players"), snap => {
      players = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderCurrent();
      if(role === "host") maybeAutoClose();
    }, err => showError(readableError(err)));

    timerHandle = setInterval(() => {
      updateTimerOnly();
      if(role === "host" && roomData?.status === "bidding" && Date.now() >= Number(roomData.deadlineMs || Infinity)){
        closeRound();
      }
    },250);
  }

  function renderCurrent(){
    if(!roomData) return;
    if(role === "host" && roomData.hostUid !== user.uid){
      showError("이 브라우저는 이 방의 교사 기기가 아닙니다.");
      return goHome();
    }
    const status = roomData.status;
    if(status === "lobby") renderLobby();
    else if(status === "bidding") renderBidding();
    else if(status === "reveal") renderReveal();
    else if(status === "finished") renderFinished();
  }

  function weightedOutcome(outcomes){
    const total = outcomes.reduce((s,o)=>s+o[4],0);
    let r = Math.random()*total;
    for(const o of outcomes){ r -= o[4]; if(r <= 0) return o; }
    return outcomes[outcomes.length-1];
  }
  function shuffled(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  async function startGame(){
    if(role !== "host") return;
    if(players.length < 1 || players.length > MAX_PLAYERS) return showError("게임은 학생 1~17명일 때 시작할 수 있습니다.");
    try{
      const chosen = [];
      while(chosen.length < TOTAL_TURNS){
        for(const item of shuffled(ITEM_POOL)){
          if(chosen.length >= TOTAL_TURNS) break;
          chosen.push(item);
        }
      }
      const batch = writeBatch(db);
      chosen.forEach((item,index)=>{
        const o = weightedOutcome(item.outcomes);
        const publicItem = {
          id:item.id, category:item.category, emoji:item.emoji, name:item.name,
          clue:item.clues[Math.floor(Math.random()*item.clues.length)]
        };
        const outcome = {tier:o[0], title:o[1], value:o[2], story:o[3]};
        batch.set(doc(db,"rooms",roomCode,"secrets",`turn_${index}`),{publicItem,outcome});
      });
      players.forEach(p=>{
        batch.update(doc(db,"rooms",roomCode,"players",p.id),{
          cash:STARTING_CASH, assetValue:0, items:[],
          done:false, decision:null, bid:0, decidedMs:null
        });
      });
      const firstItem = {
        id:chosen[0].id, category:chosen[0].category, emoji:chosen[0].emoji, name:chosen[0].name,
        clue:chosen[0].clues.find(()=>true) // 아래에서 실제 secret과 맞추기 위해 임시 사용하지 않음
      };
      // secret에 저장된 무작위 단서를 정확히 읽기 위해 배치를 먼저 완료합니다.
      await batch.commit();
      const secret = (await getDoc(doc(db,"rooms",roomCode,"secrets","turn_0"))).data();
      await updateDoc(doc(db,"rooms",roomCode),{
        status:"bidding", turnIndex:0, currentItem:secret.publicItem,
        deadlineMs:Date.now()+BID_SECONDS*1000, reveal:null, startedAt:serverTimestamp()
      });
    }catch(err){ showError(readableError(err)); }
  }

  async function submitBid(){

    window.__draftBid = String(bid);

  function maybeAutoClose(){
    if(closing || roomData?.status!=="bidding" || players.length===0) return;

  async function closeRound(){
    if(role!=="host" || closing) return;
    closing=true;
    try{
      const freshRoomSnap=await getDoc(doc(db,"rooms",roomCode));
      if(!freshRoomSnap.exists() || freshRoomSnap.data().status!=="bidding") return;
      const freshRoom=freshRoomSnap.data();
      const freshPlayersSnap=await getDocs(collection(db,"rooms",roomCode,"players"));
      const ps=freshPlayersSnap.docs.map(d=>({id:d.id,...d.data()}));
      const allDone=ps.length>0 && ps.every(p=>p.done);
      const expired=Date.now()>=Number(freshRoom.deadlineMs||0);
      if(!allDone && !expired) return;

      const batch=writeBatch(db);

      // 시간 초과 미참여자는 자동 패스
      ps.filter(p=>!p.done).forEach(p=>{
        p.done=true; p.decision="pass"; p.bid=0; p.decidedMs=Date.now();
        batch.update(doc(db,"rooms",roomCode,"players",p.id),{
          done:true,decision:"pass",bid:0,decidedMs:p.decidedMs
        });
      });

      // 비공개 secret은 이 단계에서 읽지 않습니다. 실제 가치는 카드 뒤집기 순간에만 공개됩니다.
      const bidders=ps.filter(p=>p.done && p.decision==="bid" && Number(p.bid)>0 && Number(p.bid)<=Number(p.cash))
        .sort((a,b)=>Number(b.bid)-Number(a.bid) || Number(a.decidedMs||0)-Number(b.decidedMs||0));
      const winner=bidders[0]||null;

      // 낙찰가는 바로 현금에서 차감합니다. 하지만 실제 가치/물품 가치는 카드 뒤집기 전까지 반영하지 않습니다.
      if(winner){
        batch.update(doc(db,"rooms",roomCode,"players",winner.id),{
          cash:Number(winner.cash)-Number(winner.bid)
        });
      }

      const publicBids=ps.map(p=>({
        id:p.id,nickname:p.nickname,decision:p.decision||"pass",
        bid:p.decision==="bid"?Number(p.bid):0,
        decidedMs:Number(p.decidedMs||0)
      })).sort((a,b)=>{
        if(a.decision==="pass" && b.decision!=="pass") return 1;
        if(a.decision!=="pass" && b.decision==="pass") return -1;
        return b.bid-a.bid || a.decidedMs-b.decidedMs;
      });

      const reveal={
        publicItem:freshRoom.currentItem,
        winnerId:winner?.id||null,
        winnerName:winner?.nickname||null,
        winnerBid:winner?.bid||0,
        bids:publicBids,
        revealedAt:Date.now(),
        cardFlipped:false,
        flippedAt:null,
        outcome:null
      };

      batch.set(doc(db,"rooms",roomCode,"rounds",`turn_${freshRoom.turnIndex}`),reveal);
      batch.update(doc(db,"rooms",roomCode),{
        status:"reveal",deadlineMs:null,reveal
      });
      await batch.commit();
    }catch(err){showError(readableError(err));}
    finally{closing=false;}
  }

          </div>
          ${!flipped?`<div class="notice center" style="margin-top:14px">방장이 감정 카드를 뒤집어야 모든 참가자에게 실제 가치가 공개됩니다.</div>`:""}`:
          `<div class="notice center" style="margin-top:16px">${flipped?"방장이 다음 물품을 시작할 때까지 기다려 주세요.":"방장이 카드를 뒤집을 때까지 실제 가치는 비공개입니다."}</div>`}

  async function flipRevealCard(){
    if(role!=="host" || !roomData?.reveal || roomData.reveal.cardFlipped) return;
    try{
      const turnIndex=roomData.turnIndex;
      const secretSnap=await getDoc(doc(db,"rooms",roomCode,"secrets",`turn_${turnIndex}`));
      if(!secretSnap.exists()) throw new Error("감정 결과를 찾을 수 없습니다.");
      const secret=secretSnap.data();
      const currentReveal=roomData.reveal;
      const updatedReveal={
        ...currentReveal,
        outcome:secret.outcome,
        cardFlipped:true,
        flippedAt:Date.now()
      };

      const batch=writeBatch(db);
      if(currentReveal.winnerId){
        batch.update(doc(db,"rooms",roomCode,"players",currentReveal.winnerId),{
          assetValue:Number((players.find(p=>p.id===currentReveal.winnerId)||{}).assetValue||0)+Number(secret.outcome.value),
          items:arrayUnion({
            turn:turnIndex+1,
            name:currentReveal.publicItem.name,
            outcomeTitle:secret.outcome.title,
            value:secret.outcome.value,
            paid:currentReveal.winnerBid
          })
        });
      }
      batch.update(doc(db,"rooms",roomCode),{
        reveal:updatedReveal
      });
      batch.set(doc(db,"rooms",roomCode,"rounds",`turn_${turnIndex}`),updatedReveal,{merge:true});
      await batch.commit();
    }catch(err){showError(readableError(err));}
  }

  async function nextRound(){
    if(role!=="host") return;
    if(!roomData?.reveal?.cardFlipped) return showError("감정 카드를 먼저 뒤집어 주세요.");
    try{
      if(roomData.turnIndex+1>=TOTAL_TURNS){
        await updateDoc(doc(db,"rooms",roomCode),{
          status:"finished",currentItem:null,deadlineMs:null,finishedAt:serverTimestamp()
        });
        return;
      }
      const next=roomData.turnIndex+1;
      const secret=(await getDoc(doc(db,"rooms",roomCode,"secrets",`turn_${next}`))).data();
      const batch=writeBatch(db);
      players.forEach(p=>batch.update(doc(db,"rooms",roomCode,"players",p.id),{
        done:false,decision:null,bid:0,decidedMs:null
      }));
      batch.update(doc(db,"rooms",roomCode),{
        status:"bidding",turnIndex:next,currentItem:secret.publicItem,
        deadlineMs:Date.now()+BID_SECONDS*1000,reveal:null
      });
      await batch.commit();
    }catch(err){showError(readableError(err));}
  }

  function renderFinished(){
    const ranking=[...players].map(p=>({...p,total:Number(p.cash||0)+Number(p.assetValue||0)}))
      .sort((a,b)=>b.total-a.total || b.cash-a.cash);
    const me=getMe();
    screen.innerHTML=`
      <section class="panel">
        <div class="center">
          <div style="font-size:76px">🏆</div>
          <h1>최종 경매 결과</h1>
          <p class="muted">최종 자산 = 남은 현금 + 낙찰 물품의 실제 가치</p>
        </div>
        <table>
          <thead><tr><th>순위</th><th>닉네임</th><th>남은 현금</th><th>물품 가치</th><th>최종 자산</th></tr></thead>
          <tbody>
            ${ranking.map((p,i)=>`
              <tr class="${i===0?"winner":""}">
                <td class="${i===0?"rank1":""}">${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
                <td>${esc(p.nickname)}</td><td>${won(p.cash)}</td><td>${won(p.assetValue)}</td><td><b>${won(p.total)}</b></td>
              </tr>`).join("")}
          </tbody>
        </table>
        ${role==="player"&&me?`
          <div class="panel" style="box-shadow:none;margin-top:18px">
            <h3>내가 낙찰받은 물품</h3>
            ${me.items?.length?me.items.map(it=>`
              <div class="notice" style="margin-top:8px">
                <b>${it.turn}턴 · ${esc(it.name)} → ${esc(it.outcomeTitle)}</b><br>
                낙찰가 ${won(it.paid)} · 실제 가치 ${won(it.value)}
              </div>`).join(""):`<div class="notice">낙찰받은 물품이 없습니다.</div>`}
          </div>`:""}
        <div class="actions"><button id="backBtn" class="btn ghost">처음 화면으로</button></div>
      </section>`;
    bindBack();
  }

  function readableError(err){
    console.error(err);
    const code=err?.code||"";
    if(code.includes("permission-denied")) return "Firebase 권한이 없습니다. 함께 제공된 Firestore 규칙을 적용했는지 확인하세요.";
    if(code.includes("auth/operation-not-allowed")) return "Firebase Authentication에서 익명 로그인을 활성화해야 합니다.";
    if(code.includes("network")) return "네트워크 연결을 확인해 주세요.";
    return err?.message || "알 수 없는 오류가 발생했습니다.";
  }

  try{
    app=initializeApp(firebaseConfig);
    try { getAnalytics(app); } catch (analyticsError) { console.warn("Analytics 초기화 생략:", analyticsError); }
    auth=getAuth(app);
    db=getFirestore(app);
    onAuthStateChanged(auth, async u=>{
      if(u){
        user=u; setConnected(true,"Firebase 연결됨");
        if(role&&roomCode) subscribeRoom(); else renderHome();
      }else{
        await signInAnonymously(auth);
      }
    });
  }catch(err){
    setConnected(false,"연결 실패");
    showError(readableError(err));
    renderHome();
  }
</script>
</body>
</html>
